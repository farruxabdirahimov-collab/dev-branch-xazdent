<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Dental Market</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --grad1:#667eea;
  --grad2:#764ba2;
  --grad3:#4facfe;
  --accent1:#4facfe;
  --accent2:#667eea;
  --accent3:#00f2fe;
  --glass:rgba(255,255,255,0.08);
  --glass-border:rgba(255,255,255,0.25);
  --glass-hover:rgba(255,255,255,0.12);
  --text:#1a1a3e;
  --hint:#9090b8;
  --red:#ff6b6b;
  --green:#00d97e;
  --amber:#ffd166;
  --card-shadow:0 10px 40px rgba(0,0,0,0.25);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(125deg,#FAFAFA 0%,#EDF2F5 100%);
  background-attachment:fixed;
  color:var(--text);
  padding-bottom:72px;
  min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(circle at 25% 25%,rgba(68,77,207,0.05),transparent 55%);
  pointer-events:none;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;
  background:radial-gradient(circle at 80% 80%,rgba(15,138,219,0.04),transparent 55%);
  pointer-events:none;
}

/* TOP */
.top{
  background:rgba(250,250,250,0.9);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(68,77,207,0.1);
  position:sticky;top:0;z-index:30;
}
.top-row{display:flex;align-items:center;padding:12px 14px;gap:8px}
.top-title{
  font-size:17px;font-weight:800;flex:1;
  background:linear-gradient(357deg,#0F8ADB,#444DCF);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.cart-ic{position:relative;width:38px;height:38px;border:none;
  background:rgba(255,255,255,0.6);border-radius:12px;
  border:1px solid rgba(86,66,219,0.2);
  font-size:18px;cursor:pointer;display:none;
  align-items:center;justify-content:center;color:#090979}
.cbadge{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;
  background:linear-gradient(135deg,var(--red),#ff4757);
  color:#fff;border-radius:9px;font-size:10px;
  font-weight:700;display:none;align-items:center;justify-content:center;
  padding:0 4px;border:2px solid var(--grad1)}
.cbadge.on{display:flex}
.srch-row{padding:0 14px 12px}
.srch{
  width:100%;padding:12px 16px;
  border:1px solid rgba(86,66,219,0.2);border-radius:16px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:#1a1a3e;font-size:14px;outline:none;transition:.2s;
}
.srch::placeholder{color:#9090b8}
.srch:focus{
  border-color:#5642DB;
  box-shadow:0 0 0 3px rgba(86,66,219,0.18);
}

/* CATS */
.cats{
  display:flex;flex-wrap:wrap;gap:6px;padding:8px 14px;
  background:rgba(230,230,250,0.45);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(68,77,207,0.1);
}
.cat{
  padding:8px 16px;border-radius:22px;
  border:1px solid rgba(68,77,207,0.15);
  font-size:11px;font-weight:600;cursor:pointer;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:#444DCF;white-space:nowrap;
  transition:all .25s ease;
}
.cat:active{transform:scale(.95)}
.cat:hover{background:rgba(255,255,255,0.95)}
.cat.on{
  background:linear-gradient(357deg,#0F8ADB 18%,#444DCF 100%);
  border-color:transparent;color:#fff;
  box-shadow:0 4px 12px rgba(68,77,207,0.25);
}

/* GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px;position:relative;z-index:1}
.pcard{
  background:#fff;
  border-radius:22px;overflow:hidden;
  border:1px solid rgba(68,77,207,0.08);
  box-shadow:0 4px 18px rgba(68,77,207,0.09);
  transition:all .2s ease;
}
.pcard:active{transform:scale(.97)}
.pcard:hover{transform:translateY(-2px)}
.pimg{width:100%;height:130px;background:rgba(255,255,255,0.04);
  display:flex;align-items:center;justify-content:center;
  font-size:40px;overflow:hidden;cursor:pointer;position:relative}
.pimg img{width:100%;height:130px;object-fit:cover}
.pbody{padding:11px}
.pname{font-size:13px;font-weight:600;margin-bottom:3px;cursor:pointer;color:#fff;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pshop{font-size:10px;color:#999;margin-bottom:2px}
.pcode{
  font-size:10px;font-weight:700;margin-bottom:5px;
  background:linear-gradient(135deg,#5642DB,#090979);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.pprice{
  font-size:15px;font-weight:800;margin-bottom:8px;letter-spacing:0.3px;
  color:#123E61;
}
.punit{font-size:10px;font-weight:400;
  -webkit-text-fill-color:var(--hint);background:none}
.qty-row{display:flex;align-items:center;gap:5px}
.qbtn{width:28px;height:28px;
  border:1px solid rgba(86,66,219,0.35);border-radius:8px;
  background:rgba(86,66,219,0.08);color:#5642DB;
  font-size:16px;cursor:pointer;transition:all .15s}
.qbtn:active{background:rgba(86,66,219,0.18)}
.qnum{min-width:22px;text-align:center;font-size:14px;font-weight:700;color:#1a1a3e}
.abtn{
  flex:1;padding:9px 6px;border:none;border-radius:14px;
  background:linear-gradient(357deg,#0F8ADB 18%,#444DCF 100%);
  color:#fff;font-size:11px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 14px rgba(68,77,207,0.28);
  transition:all .2s ease;
}
.abtn:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(15,138,219,0.38)}
.abtn:active{transform:scale(.95)}
.abtn.in{background:rgba(21,128,61,0.1);color:#15803d;
  border:1px solid rgba(21,128,61,0.3);box-shadow:none}
.share-btn{
  width:30px;height:30px;
  border:1px solid rgba(86,66,219,0.2);border-radius:8px;
  background:rgba(86,66,219,0.08);color:#5642DB;
  font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* CAROUSEL */
.carousel{width:100%;height:220px;background:rgba(255,255,255,0.04);
  position:relative;overflow:hidden;touch-action:pan-y}
.carousel-track{display:flex;height:100%;transition:transform .25s ease}
.carousel-slide{min-width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;font-size:70px}
.carousel-slide img{width:100%;height:100%;object-fit:cover}
.c-dots{position:absolute;bottom:8px;left:0;right:0;
  display:flex;justify-content:center;gap:5px;pointer-events:none}
.c-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5)}
.c-dot.on{background:#fff}

/* CART */
.cpanel{display:none;position:fixed;inset:0;z-index:50;
  background:rgba(0,0,0,.6);backdrop-filter:blur(6px);align-items:flex-end}
.cpanel.on{display:flex}
.csheet{
  background:linear-gradient(180deg,#FAFAFA,#EDF2F5);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:24px 24px 0 0;
  border-top:1px solid var(--glass-border);
  width:100%;max-height:85vh;display:flex;flex-direction:column}
.chdr{display:flex;align-items:center;padding:16px;
  border-bottom:1px solid var(--glass-border)}
.chdr h2{flex:1;font-size:16px;font-weight:700;color:#1a1a3e}
.cclose{width:30px;height:30px;border:none;border-radius:50%;
  background:rgba(0,0,0,0.06);font-size:15px;cursor:pointer;color:#444}
.citems{flex:1;overflow-y:auto}
.citem{display:flex;align-items:center;gap:10px;
  padding:10px 16px;border-bottom:1px solid var(--glass-border)}
.ci-img{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.ci-img img{width:44px;height:44px;object-fit:cover}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1a1a3e}
.ci-sub{font-size:11px;color:var(--hint);margin-top:1px}
.ci-price{font-size:12px;color:#123E61;font-weight:700}
.ci-ctrl{display:flex;align-items:center;gap:5px;flex-shrink:0}
.ciqb{width:26px;height:26px;border:1.5px solid var(--border);border-radius:6px;
  background:transparent;color:var(--text);font-size:14px;cursor:pointer}
.ciqn{font-size:13px;font-weight:600;min-width:18px;text-align:center}
.cidel{width:28px;height:28px;border:none;border-radius:6px;
  background:rgba(239,68,68,.1);color:var(--red);font-size:14px;cursor:pointer;flex-shrink:0}
.cftr{padding:12px 16px;border-top:1px solid var(--glass-border)}
.ctotal{display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-bottom:12px;color:#1a1a3e}
.ctotal span{color:#123E61}
.obtn{width:100%;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#22c55e,#15803d);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;
  box-shadow:0 6px 20px rgba(22,197,94,0.3);}
.obtn:active{transform:scale(.98)}
.obtn:disabled{opacity:.4}

/* DETAIL */
.dpanel{display:none;position:fixed;inset:0;z-index:40;
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);align-items:flex-end}
.dpanel.on{display:flex}
.dsheet{
  background:linear-gradient(180deg,#FAFAFA,#EDF2F5);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:24px 24px 0 0;border-top:1px solid var(--glass-border);
  width:100%;max-height:92vh;overflow-y:auto;position:relative}
.dbody{padding:16px}
.dname{font-size:19px;font-weight:800;margin-bottom:3px;color:#1a1a3e}
.dcode{font-size:12px;font-weight:700;margin-bottom:4px;
  background:linear-gradient(90deg,var(--accent1),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.dshop{font-size:13px;color:#888;margin-bottom:8px}
.dprice{font-size:28px;font-weight:800;margin-bottom:10px;color:#123E61}
.ddesc{font-size:14px;color:#666;line-height:1.6;margin-bottom:12px}
.var-label{font-size:12px;color:var(--hint);font-weight:600;
  text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px}
.var-multi-row{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--glass-border);
  background:#f8f9ff}
.var-multi-row:last-child{border-bottom:none}
.var-multi-info{flex:1}
.var-multi-name{font-size:14px;font-weight:600;color:#1a1a3e}
.var-multi-stock{font-size:11px;color:var(--green);margin-top:2px}
.var-multi-ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0}
.vmbtn{width:32px;height:32px;border:1px solid rgba(79,172,254,0.5);border-radius:8px;
  background:rgba(79,172,254,0.08);color:var(--accent1);font-size:18px;font-weight:700;cursor:pointer}
.vmnum{font-size:16px;font-weight:700;min-width:24px;text-align:center;color:#fff}
.vmnum.active{color:var(--accent1)}
.dqrow{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.dqlabel{font-size:14px;font-weight:500}
.dqctrl{display:flex;align-items:center;gap:10px;flex:1}
.dqb{width:36px;height:36px;border:1.5px solid var(--btn);border-radius:10px;
  background:transparent;color:var(--btn);font-size:20px;cursor:pointer}
.dqn{font-size:18px;font-weight:700;min-width:32px;text-align:center}
.dabtn{
  flex:1;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(357deg,#0F8ADB 18%,#444DCF 100%);
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  box-shadow:0 5px 18px rgba(68,77,207,0.3);transition:all .15s}
.dabtn:active{transform:scale(.97)}
.dabtn.green{
  background:linear-gradient(135deg,#22c55e,#15803d);
  box-shadow:0 5px 18px rgba(22,197,94,0.35)}
.dclose{position:absolute;top:12px;right:12px;width:32px;height:32px;
  border:none;border-radius:50%;
  background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;font-size:16px;cursor:pointer;z-index:5}

/* MY PRODUCTS */
.myprod{display:flex;align-items:center;gap:12px;padding:12px 16px;
  border-bottom:1px solid var(--glass-border);background:transparent}
.mpimg{width:52px;height:52px;border-radius:12px;background:rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;overflow:hidden}
.mpimg img{width:52px;height:52px;object-fit:cover}
.mpinfo{flex:1;min-width:0}
.mpname{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1a1a3e}
.mpprice{font-size:13px;font-weight:700;margin-top:1px;color:#123E61}
.mpcode{font-size:10px;color:var(--hint);margin-top:1px}
.mpbtns{display:flex;gap:5px;flex-shrink:0}
.mpbtn{width:36px;height:36px;border:none;border-radius:10px;font-size:15px;cursor:pointer}
.mpbtn.share{background:rgba(79,172,254,0.15);color:var(--accent1);border:1px solid rgba(79,172,254,0.3)}
.mpbtn.del{background:rgba(255,107,107,0.12);color:var(--red);border:1px solid rgba(255,107,107,0.3)}

/* FORM */
.fpanel{display:none;position:fixed;inset:0;z-index:60;
  background:rgba(0,0,0,.65);backdrop-filter:blur(8px);align-items:flex-end}
.fpanel.on{display:flex}
.fsheet{
  background:#FAFAFA;
  border-radius:24px 24px 0 0;border-top:1px solid var(--glass-border);
  padding:20px;width:100%;max-height:94vh;overflow-y:auto}
.ftitle{font-size:17px;font-weight:800;margin-bottom:16px;color:#1a1a3e !important}
.flabel{font-size:11px;color:#444 !important;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.finp{width:100%;padding:12px 14px;border:1px solid var(--glass-border);
  border-radius:12px;font-size:15px;background:rgba(255,255,255,0.07);
  color:#1a1a3e;outline:none;margin-bottom:14px}
.finp::placeholder{color:var(--hint)}
.finp:focus{border-color:var(--accent1);box-shadow:0 0 0 3px rgba(79,172,254,0.15)}
.frow{display:flex;gap:8px;margin-bottom:14px}
.frow .finp{margin-bottom:0}

/* Category checkboxes */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.cat-chk{display:flex;align-items:center;gap:8px;padding:10px 12px;
  border:1px solid rgba(255,255,255,0.15);border-radius:12px;cursor:pointer;
  font-size:13px;font-weight:500;transition:all .15s;
  background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.8)}
.cat-chk input{display:none}
.cat-chk.on{
  border-color:var(--accent1);
  background:linear-gradient(135deg,rgba(79,172,254,0.2),rgba(102,126,234,0.2));
  color:#fff;box-shadow:0 0 12px rgba(79,172,254,0.2)}

/* Photos */
.photos-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;
  padding-bottom:4px;scrollbar-width:none}
.photos-row::-webkit-scrollbar{display:none}
.photo-thumb{width:80px;height:80px;border-radius:10px;
  border:1.5px solid var(--border);overflow:hidden;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);position:relative}
.photo-thumb img{width:80px;height:80px;object-fit:cover}
.photo-thumb .del-ph{position:absolute;top:2px;right:2px;
  width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);
  color:#fff;font-size:10px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.add-photo-btn{width:80px;height:80px;border-radius:10px;
  border:2px dashed var(--border);flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;gap:3px;background:transparent}
.add-photo-btn span:first-child{font-size:24px}
.add-photo-btn span:last-child{font-size:10px;color:var(--hint)}

/* Variants editor */
.var-editor{margin-bottom:14px}
.var-item{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.var-item .finp{margin-bottom:0;flex:1}
.var-del{width:32px;height:38px;border:none;border-radius:8px;
  background:rgba(255,107,107,0.12);color:var(--red);font-size:14px;cursor:pointer;flex-shrink:0}
.add-var-btn{width:100%;padding:10px;border:1px dashed rgba(11,207,4,0.4);
  border-radius:12px;background:rgba(11,207,4,0.05);color:#0BCF04;
  font-size:13px;font-weight:600;cursor:pointer;margin-bottom:14px}
.fsave{width:100%;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(180deg,#1EEB1E 0%,#0BCF04 100%);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;
  box-shadow:0 6px 20px rgba(11,207,4,0.35);}
.fsave:active{transform:scale(.98)}
.fsave:disabled{opacity:.4;box-shadow:none}
.fcancel{width:100%;padding:12px;border:none;background:transparent;
  color:var(--hint);font-size:14px;cursor:pointer;margin-top:6px}

/* SUCCESS card */
.success-card{
  background:rgba(79,172,254,0.1);backdrop-filter:blur(12px);
  border-radius:20px;padding:20px;margin:16px;
  border:1px solid rgba(79,172,254,0.3);
  box-shadow:0 8px 32px rgba(79,172,254,0.2);text-align:center}
.sc-code{font-size:22px;font-weight:800;margin:8px 0;
  background:linear-gradient(90deg,var(--accent1),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sc-btns{display:flex;gap:8px;margin-top:14px}
.sc-btn{flex:1;padding:11px;border:none;border-radius:12px;
  font-size:13px;font-weight:600;cursor:pointer}
.sc-btn.blue{background:linear-gradient(357deg,#0F8ADB 18%,#444DCF 100%);color:#fff;
  box-shadow:0 4px 15px rgba(68,77,207,0.25)}
.sc-btn.green{background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;
  box-shadow:0 4px 15px rgba(22,197,94,0.28)}
.sc-btn.outline{background:rgba(255,255,255,0.08);border:1px solid var(--glass-border);color:#fff}

/* FAB */
.fab{position:fixed;bottom:80px;right:16px;width:56px;height:56px;
  border-radius:50%;border:none;
  background:linear-gradient(357deg,#0F8ADB 18%,#444DCF 100%);
  color:#fff;font-size:26px;cursor:pointer;
  box-shadow:0 6px 25px rgba(68,77,207,0.32);
  display:none;align-items:center;justify-content:center;z-index:20;
  transition:transform .15s}
.fab:active{transform:scale(.92)}
.fab.show{display:flex}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;
  background:rgba(250,250,250,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--glass-border);display:flex;z-index:20}
.nb{flex:1;padding:10px 4px 8px;border:none;background:transparent;
  color:#aaa;font-size:10px;font-weight:600;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s}
.nb.on{color:#444DCF}
.nb-ic{font-size:22px;line-height:1}

.spin{display:inline-block;width:28px;height:28px;
  border:2.5px solid rgba(79,172,254,0.2);border-top-color:var(--accent1);
  border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:50px 20px;color:var(--hint);position:relative;z-index:1}
.empty{text-align:center;padding:50px 20px;color:var(--hint);position:relative;z-index:1}
.empty-ic{font-size:44px;margin-bottom:10px}
</style>
</head>
<body>

<div class="top">
  <div class="top-row">
    <div class="top-title" id="top-title">🛍 XazDent Market</div>
    <button class="cart-ic" id="cart-ic" onclick="openCart()">
      🛒<div class="cbadge" id="cbadge"></div>
    </button>
  </div>

<script>
var tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }
var UID = 0, ROLE = 'clinic';
if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) UID = tg.initDataUnsafe.user.id;
var _qp = new URLSearchParams(window.location.search);
if (!UID) UID = parseInt(_qp.get('uid')||'0')||0;
ROLE = _qp.get('role') || 'clinic';

var cart = {}, curCat = '', curSearch = '', curView = 'catalog';
var formPhotos = [], varCount = 0, _prods = {};
var varSelections = {}, detPid = null, detProd = null, detQty = 1;

// Category checkboxes
document.querySelectorAll('.cat-chk').forEach(function(lbl) {
  lbl.querySelector('input').addEventListener('change', function() {
    lbl.classList.toggle('on', this.checked);
  });
});

(function init() {
  if (ROLE === 'seller') {
    document.getElementById('nb-my').style.display = 'flex';
    document.getElementById('fab').classList.add('show');
  } else {
    document.getElementById('cart-ic').style.display = 'flex';
  }
  var action = _qp.get('action');
  if (action === 'add' && ROLE === 'seller') {
    loadCatalog(); setTimeout(openForm, 400);
  } else {
    loadCatalog();
  }
})();

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(n){ return Math.round(n||0).toLocaleString(); }

// ── VIEW ─────────────────────────────────────────────────────────────────────
function showView(v, btn) {
  curView = v;
  document.querySelectorAll('.nb').forEach(function(b){ b.classList.remove('on'); });
  if (btn) btn.classList.add('on');
  var isCat = v === 'catalog';
  document.getElementById('srch-row').style.display = isCat ? 'block' : 'none';
  document.getElementById('cats').style.display = isCat ? 'flex' : 'none';
  document.getElementById('fab').classList.toggle('show', v === 'my' && ROLE === 'seller');
  if (v === 'catalog') { document.getElementById('top-title').textContent = '🛍 XazDent Market'; loadCatalog(); }
  else if (v === 'my') { document.getElementById('top-title').textContent = '📦 Mahsulotlarim'; loadMy(); }
  else { document.getElementById('top-title').textContent = '📋 Buyurtmalar';
    document.getElementById('main').innerHTML = '<div class="empty"><div class="empty-ic">📋</div>Tez orada...</div>'; }
}

// ── CATALOG ──────────────────────────────────────────────────────────────────
function loadCatalog() {
  document.getElementById('main').innerHTML = '<div class="loading"><div class="spin"></div></div>';
  fetch('/api/catalog?uid='+UID+'&cat='+curCat+'&q='+encodeURIComponent(curSearch))
    .then(function(r){ return r.json(); }).then(function(d) {
      var prods = d.products || [];
      prods.forEach(function(p){ _prods[p.id] = p; });
      if (!prods.length) {
        document.getElementById('main').innerHTML = '<div class="empty"><div class="empty-ic">🔍</div>Mahsulot topilmadi</div>';
        return;
      }
      var html = '<div class="grid">';
      prods.forEach(function(p) {
        var inCart = cart[p.id] ? cart[p.id].qty : 0;
        var firstPh = p.photos && p.photos[0];
        var imgH = firstPh ? '<img src="'+firstPh+'" onerror="this.parentNode.innerHTML=\'🦷\'">' : '🦷';
        var hasVars = p.variants && p.variants.length > 0;
        html += '<div class="pcard">'+
          '<div class="pimg" onclick="openDetail('+p.id+')">'+imgH+'</div>'+
          '<div class="pbody">'+
            '<div class="pname" onclick="openDetail('+p.id+')">'+esc(p.name)+'</div>'+
            '<div class="pshop">🏪 '+esc(p.shop_name||'?')+'</div>'+
            (p.article_code?'<div class="pcode">'+esc(p.article_code)+'</div>':'')+
            '<div class="pprice">'+fmt(p.price)+' <span class="punit">so\'m/'+esc(p.unit)+'</span></div>'+
            '<div style="display:flex;gap:4px;align-items:center">'+
              '<button class="share-btn" onclick="event.stopPropagation();shareProd('+p.id+')">📤</button>'+
              (ROLE!=='seller'?(
                hasVars?
                  '<button class="abtn" onclick="openDetail('+p.id+')">⚡ Ko\'rish</button>':
                  '<div class="qty-row" id="qr-'+p.id+'" style="flex:1">'+renderQtyHtml(p.id,inCart)+'</div>'
              ):'<button class="abtn" onclick="openDetail('+p.id+')">⚡ Ko\'rish</button>')+
            '</div>'+
          '</div></div>';
      });
      html += '</div>';
      document.getElementById('main').innerHTML = html;
    }).catch(function(e){
      document.getElementById('main').innerHTML = '<div class="empty">❌ '+e.message+'</div>';
    });
}

function renderQtyHtml(pid, inCart) {
  if (inCart > 0) {
    return '<button class="qbtn" onclick="event.stopPropagation();chQty('+pid+',-1)">−</button>'+
      '<span class="qnum">'+inCart+'</span>'+
      '<button class="qbtn" onclick="event.stopPropagation();chQty('+pid+',1)">+</button>';
  }
  return '<button class="abtn" onclick="event.stopPropagation();addToCart('+pid+')">+ Savat</button>';
}

function addToCart(pid) {
  var p = _prods[pid]; if (!p) return;
  cart[pid] = {product:p, qty:1};
  updateCartBadge(); renderQtyRow(pid);
}

function chQty(pid, d) {
  if (!cart[pid]) return;
  cart[pid].qty += d;
  if (cart[pid].qty <= 0) delete cart[pid];
  updateCartBadge(); renderQtyRow(pid);
}

function renderQtyRow(pid) {
  var el = document.getElementById('qr-'+pid); if (!el) return;
  el.innerHTML = renderQtyHtml(pid, cart[pid]?cart[pid].qty:0);
}

function updateCartBadge() {
  var total = Object.values(cart).reduce(function(s,i){return s+i.qty;},0);
  var badge = document.getElementById('cbadge');
  badge.textContent = total;
  badge.classList.toggle('on', total > 0);
}

// ── CATS ─────────────────────────────────────────────────────────────────────
function selCat(btn, c) {
  curCat = c;
  document.querySelectorAll('.cat').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  loadCatalog();
}

var _srchTimer;
function onSearch(q) {
  clearTimeout(_srchTimer);
  _srchTimer = setTimeout(function(){ curSearch=q; loadCatalog(); }, 400);
}

// ── DETAIL ───────────────────────────────────────────────────────────────────
function openDetail(pid) {
  var p = _prods[pid]; if (!p) return;
  detPid = pid; detProd = p; detQty = 1; varSelections = {};
  var ds = document.getElementById('dsheet');
  var hasVars = p.variants && p.variants.length > 0;

  // Carousel
  var photos = p.photos && p.photos.length ? p.photos : [];
  var carHtml = '';
  if (photos.length > 1) {
    carHtml = '<div class="carousel" id="det-car" ontouchstart="csStart(event)" ontouchmove="csMove(event)" ontouchend="csEnd()">'+
      '<div class="carousel-track" id="cs-track">'+
        photos.map(function(ph){
          return '<div class="carousel-slide"><img src="'+ph+'" onerror="this.parentNode.innerHTML=\'🦷\'"></div>';
        }).join('')+
      '</div>'+
      '<div class="c-dots" id="cs-dots">'+
        photos.map(function(_,i){return '<div class="c-dot'+(i===0?' on':'')+'"></div>';}).join('')+
      '</div></div>';
  } else if (photos.length === 1) {
    carHtml = '<div class="carousel"><div class="carousel-slide"><img src="'+photos[0]+'" onerror="this.parentNode.innerHTML=\'🦷\'"></div></div>';
  } else {
    carHtml = '<div class="carousel"><div style="font-size:70px">🦷</div></div>';
  }

  // Variants
  var varsHtml = '';
  if (hasVars) {
    varsHtml = '<div class="var-label">Razmer / Variantlar:</div>'+
      '<div style="border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-bottom:14px">'+
      p.variants.map(function(v){
        var ok = v.stock > 0;
        return '<div class="var-multi-row">'+
          '<div class="var-multi-info">'+
            '<div class="var-multi-name">'+esc(v.size_name||'')+(v.article?' <span style="font-size:10px;color:var(--hint)">'+esc(v.article)+'</span>':'')+'</div>'+
            (ok?'<div class="var-multi-stock">✅ '+v.stock+' ta mavjud</div>':'<div class="var-multi-stock" style="color:var(--red)">❌ Tugagan</div>')+
          '</div>'+
          '<div class="var-multi-ctrl">'+
            '<button class="vmbtn" onclick="varMinus(\''+esc(v.size_name)+'\')">−</button>'+
            '<span class="vmnum" id="vn-'+esc(v.size_name)+'">0</span>'+
            '<button class="vmbtn" onclick="varPlus(\''+esc(v.size_name)+'\''+(ok?','+v.stock:',0')+')">+</button>'+
          '</div>'+
        '</div>';
      }).join('')+
      '</div>'+
      '<div id="var-total" style="font-size:13px;color:var(--btn);font-weight:600;margin-bottom:10px;text-align:right"></div>';
  }

  // Buyer actions
  var buyerHtml = '';
  if (ROLE !== 'seller') {
    if (hasVars) {
      buyerHtml = varsHtml+
        '<div style="display:flex;gap:8px;margin-bottom:8px">'+
          '<button class="dabtn" onclick="detAddCart()">🛒 Savatga</button>'+
          '<button class="dabtn green" onclick="detQuick()">⚡ Hozir</button>'+
        '</div>';
    } else {
      buyerHtml =
        '<div class="dqrow">'+
          '<div class="dqlabel">Miqdor:</div>'+
          '<div class="dqctrl">'+
            '<button class="dqb" onclick="dQty(-1)">−</button>'+
            '<span class="dqn" id="det-qty-n">1</span>'+
            '<button class="dqb" onclick="dQty(1)">+</button>'+
            '<span style="font-size:13px;color:var(--hint)">'+esc(p.unit)+'</span>'+
          '</div></div>'+
        '<div style="display:flex;gap:8px;margin-bottom:8px">'+
          '<button class="dabtn" onclick="detAddCart()">🛒 Savatga</button>'+
          '<button class="dabtn green" onclick="detQuick()">⚡ Hozir</button>'+
        '</div>';
    }
    buyerHtml +=
      '<div style="display:flex;gap:8px">'+
        '<button onclick="shareProd('+pid+')" style="flex:1;padding:10px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--hint);font-size:13px;cursor:pointer">📤 Ulashish</button>'+
        '<button onclick="getQR('+pid+')" style="padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--hint);font-size:18px;cursor:pointer">🔳</button>'+
      '</div>';
  }

  ds.innerHTML =
    '<button class="dclose" onclick="closeDp()">✕</button>'+
    carHtml+
    '<div class="dbody">'+
      '<div class="dname">'+esc(p.name)+'</div>'+
      (p.article_code?'<div class="dcode">📌 '+esc(p.article_code)+'</div>':'')+
      '<div class="dshop">🏪 '+esc(p.shop_name||'?')+' · 📍 '+esc(p.region||'')+'</div>'+
      '<div class="dprice">'+fmt(p.price)+' so\'m <span style="font-size:14px;font-weight:400;color:var(--hint)">/'+esc(p.unit)+'</span></div>'+
      (p.description?'<div class="ddesc">'+esc(p.description)+'</div>':'')+
      buyerHtml+
    '</div>';

  document.getElementById('dpanel').classList.add('on');
  initCarousel();
}

function closeDp(){ document.getElementById('dpanel').classList.remove('on'); }
function closeDpBg(e){ if(e.target===document.getElementById('dpanel')) closeDp(); }

// Qty
function dQty(d){ detQty=Math.max(1,detQty+d); document.getElementById('det-qty-n').textContent=detQty; }

// Variant ctrl
window.varPlus = function(name, maxStock) {
  if (!varSelections[name]) varSelections[name] = 0;
  if (maxStock > 0 && varSelections[name] >= maxStock) return;
  if (maxStock === 0) return; // Tugagan
  varSelections[name]++;
  updVarUI(name);
};
window.varMinus = function(name) {
  if (!varSelections[name] || varSelections[name] <= 0) return;
  varSelections[name]--;
  if (!varSelections[name]) delete varSelections[name];
  updVarUI(name);
};
function updVarUI(name) {
  var el = document.getElementById('vn-'+name);
  var qty = varSelections[name] || 0;
  if (el) { el.textContent = qty; el.classList.toggle('active', qty > 0); }
  var total = 0, price = detProd ? detProd.price : 0;
  Object.values(varSelections).forEach(function(q){ total += q; });
  var tel = document.getElementById('var-total');
  if (tel) tel.textContent = total > 0 ? 'Jami: '+total+' dona · '+fmt(price*total)+' so\'m' : '';
}

function detAddCart() {
  var p = detProd; if (!p) return;
  var hasVars = p.variants && p.variants.length > 0;
  if (hasVars) {
    var keys = Object.keys(varSelections);
    if (!keys.length) { alert('Kamida bitta variant tanlang!'); return; }
    keys.forEach(function(name) {
      var key = detPid+'_v_'+name;
      cart[key] = {product:p, variantId:name, qty:varSelections[name], key:key};
    });
    varSelections = {};
  } else {
    cart[detPid] = {product:p, qty:detQty};
  }
  updateCartBadge(); renderQtyRow(detPid); closeDp();
  if (tg) tg.showAlert('✅ Savatga qo\'shildi!');
}

function detQuick() {
  var p = detProd; if (!p) return;
  var hasVars = p.variants && p.variants.length > 0;
  var items = [];
  if (hasVars) {
    var keys = Object.keys(varSelections);
    if (!keys.length) { alert('Kamida bitta variant tanlang!'); return; }
    keys.forEach(function(name){ items.push({size_name:name, qty:varSelections[name]}); });
  } else {
    items.push({size_name:null, qty:detQty});
  }
  closeDp(); varSelections = {};
  fetch('/api/catalog/quick_order_direct', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({product_id:detPid, user_id:UID, items:items})
  }).then(function(r){return r.json();}).then(function(d){
    if (d.ok) { if(tg) tg.showAlert('✅ Buyurtma #'+d.order_id+' yuborildi!\nSotuvchi tez orada bog\'lanadi.'); }
    else { if(tg) tg.showAlert('❌ '+(d.error||'Xato')); }
  });
}

// ── ULASHISH & QR ────────────────────────────────────────────────────────────
function shareProd(pid) {
  var p = _prods[pid]; if (!p) return;
  var code = p.article_code || ('p_'+pid);
  var url = 'https://t.me/XazdentBot?start=xz_'+code;
  var txt = '🦷 '+p.name+' — '+fmt(p.price)+' so\'m/'+p.unit+
    '\n🏪 '+(p.shop_name||'')+
    (p.article_code?'\n📌 '+p.article_code:'')+
    '\n\n👆 '+url;
  if (tg && tg.openTelegramLink) {
    var shareUrl = 'https://t.me/share/url?url='+encodeURIComponent(url)+'&text='+encodeURIComponent('🦷 '+p.name+' — '+fmt(p.price)+' so\'m');
    tg.openTelegramLink(shareUrl);
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(function(){ alert('Havola nusxalandi!'); });
  }
}

function getQR(pid) {
  var p = _prods[pid];
  var code = (p && p.article_code) ? p.article_code : ('XZ?????');
  if (tg) {
    tg.showPopup({
      title: '🔳 QR Kod — '+code,
      message: 'QR kodni yuklab Instagram postga joylashtiring!\nMijozlar skan qilib darhol buyurtma beradi.\n\n#'+code+' #xazdent',
      buttons: [{id:'dl',type:'default',text:'⬇️ Yuklab olish'},{id:'cancel',type:'cancel',text:'Yopish'}]
    }, function(btnId){ if(btnId==='dl') window.open('/api/catalog/qr/'+pid,'_blank'); });
  } else { window.open('/api/catalog/qr/'+pid,'_blank'); }
}

// ── CAROUSEL ─────────────────────────────────────────────────────────────────
var csIdx = 0, csX0 = 0;
function initCarousel() {
  csIdx = 0;
  var track = document.getElementById('cs-track');
  if (track) track.style.transform = 'translateX(0)';
  updDots();
}
function csStart(e){ csX0 = e.touches[0].clientX; }
function csMove(e){ e.preventDefault(); }
function csEnd(){ }
document.addEventListener('touchstart', function(e){
  var car = document.getElementById('det-car');
  if (car && car.contains(e.target)) csX0 = e.touches[0].clientX;
}, {passive:true});
document.addEventListener('touchend', function(e){
  var car = document.getElementById('det-car');
  if (!car || !car.contains(e.target)) return;
  var dx = e.changedTouches[0].clientX - csX0;
  var p = detProd; if (!p || !p.photos) return;
  var total = p.photos.length;
  if (Math.abs(dx) > 40) {
    if (dx < 0) csIdx = Math.min(csIdx+1, total-1);
    else csIdx = Math.max(csIdx-1, 0);
  }
  var track = document.getElementById('cs-track');
  if (track) track.style.transform = 'translateX(-'+csIdx*100+'%)';
  updDots();
});
function updDots() {
  var dots = document.querySelectorAll('#cs-dots .c-dot');
  dots.forEach(function(d,i){ d.classList.toggle('on', i===csIdx); });
}

// ── MY PRODUCTS ──────────────────────────────────────────────────────────────
function loadMy() {
  document.getElementById('main').innerHTML = '<div class="loading"><div class="spin"></div></div>';
  fetch('/api/catalog/my?uid='+UID)
    .then(function(r){return r.json();}).then(function(d){
      var prods = d.products || [];
      if (!prods.length) {
        document.getElementById('main').innerHTML =
          '<div class="empty"><div class="empty-ic">📦</div>Mahsulot yo\'q<br><small>➕ tugmani bosib qo\'shing</small></div>';
        return;
      }
      var html = '<div style="background:#fff;border-radius:20px;overflow:hidden;margin:12px;border:1px solid rgba(68,77,207,0.08);box-shadow:0 4px 16px rgba(68,77,207,0.08)">';
      prods.forEach(function(p){
        var img = p.photos&&p.photos[0]?'<img src="'+p.photos[0]+'" onerror="this.parentNode.innerHTML=\'📦\'">':'📦';
        html += '<div class="myprod">'+
          '<div class="mpimg">'+img+'</div>'+
          '<div class="mpinfo">'+
            '<div class="mpname">'+esc(p.name)+'</div>'+
            '<div class="mpprice">'+fmt(p.price)+' so\'m/'+esc(p.unit)+'</div>'+
            (p.article_code?'<div class="mpcode">📌 '+esc(p.article_code)+'</div>':'')+
          '</div>'+
          '<div class="mpbtns">'+
            '<button class="mpbtn share" onclick="shareProdMy('+p.id+',\''+esc(p.article_code||'')+'\')">📤</button>'+
            '<button class="mpbtn del" onclick="delProd('+p.id+')">🗑</button>'+
          '</div>'+
        '</div>';
      });
      html += '</div>';
      document.getElementById('main').innerHTML = html;
    }).catch(function(e){
      document.getElementById('main').innerHTML = '<div class="empty">❌ '+e.message+'</div>';
    });
}

function shareProdMy(pid, code) {
  var p = _prods[pid];
  if (!p) { fetch('/api/catalog/product/'+pid+'?uid='+UID).then(function(r){return r.json();}).then(function(d){ _prods[pid]=d; shareProd(pid); }); return; }
  shareProd(pid);
}

function delProd(pid) {
  if (!confirm('O\'chirishni tasdiqlaysizmi?')) return;
  fetch('/api/catalog/del_product', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({product_id:pid, user_id:UID})
  }).then(function(r){return r.json();}).then(function(d){
    if (d.ok) loadMy();
    else alert('Xato: '+(d.error||''));
  });
}

// ── CART ─────────────────────────────────────────────────────────────────────
function openCart() {
  renderCart();
  document.getElementById('cpanel').classList.add('on');
}
function closeCart() { document.getElementById('cpanel').classList.remove('on'); }

function renderCart() {
  var items = Object.values(cart);
  if (!items.length) {
    document.getElementById('citems').innerHTML = '<div class="empty" style="padding:30px">🛒 Savat bo\'sh</div>';
    document.getElementById('ctotal').textContent = '0 so\'m';
    document.getElementById('obtn').disabled = true;
    return;
  }
  document.getElementById('obtn').disabled = false;
  var total = 0, html = '';
  items.forEach(function(it) {
    var p = it.product, sub = p.price * it.qty;
    total += sub;
    var img = p.photos&&p.photos[0]?'<img src="'+p.photos[0]+'" onerror="this.parentNode.innerHTML=\'🦷\'">':'🦷';
    var key = it.key || p.id;
    var label = p.name + (it.variantId?' ('+it.variantId+')':'');
    html += '<div class="citem">'+
      '<div class="ci-img">'+img+'</div>'+
      '<div class="ci-info">'+
        '<div class="ci-name">'+esc(label)+'</div>'+
        '<div class="ci-price">'+fmt(sub)+' so\'m</div>'+
      '</div>'+
      '<div class="ci-ctrl">'+
        '<button class="ciqb" onclick="cChQty(\''+key+'\', -1)">−</button>'+
        '<span class="ciqn">'+it.qty+'</span>'+
        '<button class="ciqb" onclick="cChQty(\''+key+'\', 1)">+</button>'+
        '<button class="cidel" onclick="cDel(\''+key+'\')">🗑</button>'+
      '</div>'+
    '</div>';
  });
  document.getElementById('citems').innerHTML = html;
  document.getElementById('ctotal').textContent = fmt(total)+' so\'m';
}

function cChQty(key, d) {
  if (!cart[key]) return;
  cart[key].qty += d;
  if (cart[key].qty <= 0) delete cart[key];
  updateCartBadge(); renderCart();
}
function cDel(key) { delete cart[key]; updateCartBadge(); renderCart(); }

function submitOrder() {
  var items = Object.values(cart);
  if (!items.length) return;
  document.getElementById('obtn').disabled = true;
  document.getElementById('obtn').textContent = '⏳ Yuborilmoqda...';
  fetch('/api/catalog/cart_order', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({items:items.map(function(it){
      return {
        product_id: it.product.id,
        seller_id:  it.product.seller_id,
        qty:        it.qty,
        variant:    it.variantId || null,
        price:      it.product.price,
        name:       it.product.name,
        unit:       it.product.unit,
        shop_name:  it.product.shop_name || ''
      };
    }), user_id:UID})
  }).then(function(r){return r.json();}).then(function(d){
    if (d.ok) {
      cart = {}; updateCartBadge(); closeCart();
      if (tg) tg.showAlert('✅ Buyurtma yuborildi! Sotuvchi tez orada bog\'lanadi.');
    } else { alert('Xato: '+(d.error||'')); }
    document.getElementById('obtn').disabled = false;
    document.getElementById('obtn').textContent = '📦 Buyurtma berish';
  });
}

// ── FORM ─────────────────────────────────────────────────────────────────────
function openForm() { document.getElementById('fpanel').classList.add('on'); }
function closeForm() {
  document.getElementById('fpanel').classList.remove('on');
  document.getElementById('f-name').value = '';
  document.getElementById('f-price').value = '';
  document.getElementById('f-stock').value = '';
  document.getElementById('f-desc').value = '';
  document.querySelectorAll('.cat-chk').forEach(function(l){
    l.querySelector('input').checked = false; l.classList.remove('on');
  });
  formPhotos = []; varCount = 0;
  document.getElementById('var-editor').innerHTML = '';
  renderPhotoRow();
}

function triggerPhoto() { document.getElementById('photo-inp').click(); }

function onPhoto(inp) {
  if (!inp.files[0]) return;
  if (formPhotos.length >= 5) { alert('Maksimum 5 ta rasm!'); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    compressImg(e.target.result, function(compressed) {
      formPhotos.push({dataUrl:e.target.result, compressed:compressed});
      renderPhotoRow();
    });
  };
  reader.readAsDataURL(inp.files[0]);
  inp.value = '';
}

function compressImg(src, cb) {
  var img = new Image();
  img.onload = function() {
    var cv = document.createElement('canvas');
    var max = 1000, w = img.width, h = img.height;
    if (w > max) { h = h*max/w; w = max; }
    if (h > max) { w = w*max/h; h = max; }
    cv.width = w; cv.height = h;
    cv.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(cv.toDataURL('image/jpeg', 0.75));
  };
  img.src = src;
}

function renderPhotoRow() {
  var row = document.getElementById('photos-row');
  var html = formPhotos.map(function(ph, i) {
    return '<div class="photo-thumb"><img src="'+ph.dataUrl+'"><button class="del-ph" onclick="delPhoto('+i+')">✕</button></div>';
  }).join('');
  if (formPhotos.length < 5) {
    html += '<div class="add-photo-btn" onclick="triggerPhoto()"><span>📷</span><span>Rasm qo\'sh</span></div>';
  }
  row.innerHTML = html;
}

function delPhoto(i) { formPhotos.splice(i,1); renderPhotoRow(); }

function addVarRow() {
  var id = ++varCount;
  var row = document.createElement('div');
  row.className = 'var-item';
  row.id = 'vr-'+id;
  row.innerHTML =
    '<input class="finp" id="vs-'+id+'" placeholder="Razmer (masalan: 4008)">' +
    '<input class="finp" id="va-'+id+'" placeholder="Artikul (ixtiyoriy)" style="flex:.8">' +
    '<input class="finp" id="vq-'+id+'" placeholder="Stok" type="number" style="flex:.5">' +
    '<button class="var-del" onclick="this.parentNode.remove()">✕</button>';
  document.getElementById('var-editor').appendChild(row);
}

function saveProduct() {
  var name = document.getElementById('f-name').value.trim();
  var price = parseFloat(document.getElementById('f-price').value);
  var unit = document.getElementById('f-unit').value;
  var stock = parseInt(document.getElementById('f-stock').value)||0;
  var desc = document.getElementById('f-desc').value.trim();

  // Kategoriyalar
  var cats = Array.from(document.querySelectorAll('.cat-chk input:checked')).map(function(i){return parseInt(i.value);});

  if (!name) { alert('Mahsulot nomini kiriting!'); return; }
  if (!price || price <= 0) { alert('Narxni kiriting!'); return; }
  if (!cats.length) { alert('Kamida bitta yo\'nalish tanlang!'); return; }

  // Variantlar
  var variants = [];
  document.querySelectorAll('.var-item').forEach(function(row) {
    var id = row.id.split('-')[1];
    var size = document.getElementById('vs-'+id);
    var art = document.getElementById('va-'+id);
    var qty = document.getElementById('vq-'+id);
    if (size && size.value.trim()) {
      variants.push({size_name:size.value.trim(), article:art?art.value.trim():'', stock:qty?parseInt(qty.value)||0:0});
    }
  });

  var btn = document.getElementById('fsave');
  btn.disabled = true; btn.textContent = '⏳ Saqlanmoqda...';

  fetch('/api/catalog/add_product', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      user_id:UID, name:name, price:price, unit:unit,
      stock:stock, description:desc,
      category_id:cats[0], categories:cats,
      photos:formPhotos.map(function(p){return p.compressed;}),
      variants:variants
    })
  }).then(function(r){return r.json();}).then(function(d){
    btn.disabled = false; btn.textContent = '💾 Saqlash';
    if (d.ok) {
      closeForm();
      showSuccessCard(d.product_id, d.article_code, name, price, unit);
      loadMy();
    } else {
      var err = d.error || '';
      if (err.includes('article_code')) err = "Kod xatosi. Qayta urinib ko'ring";
      else if (err.includes('not exist')) err = "Baza yangilanmoqda. 1 daqiqa kuting";
      if (tg) tg.showAlert('❌ ' + err);
      else alert('❌ ' + err);
    }
  }).catch(function(e){
    btn.disabled=false; btn.textContent='💾 Saqlash';
    var msg = e.message || '';
    if (msg.includes('413') || msg.includes('Too Large')) msg = "Rasm hajmi juda katta! Kichikroq rasm tanlang";
    else if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) msg = "Internet ulanishi yo'q. Qayta urinib ko'ring";
    else if (msg.includes('500')) msg = "Server xatosi. Qayta urinib ko'ring";
    else if (msg.includes('404')) msg = "Topilmadi";
    if (tg) tg.showAlert('❌ ' + msg);
    else alert('❌ ' + msg);
  });
}

function showSuccessCard(pid, code, name, price, unit) {
  var html = '<div class="success-card">'+
    '<div style="font-size:40px;margin-bottom:8px">✅</div>'+
    '<div style="font-size:16px;font-weight:700;margin-bottom:4px;color:#fff">Mahsulot qo\'shildi!</div>'+
    '<div style="font-size:14px;color:var(--hint);margin-bottom:8px">'+esc(name)+' · '+fmt(price)+' so\'m/'+esc(unit)+'</div>'+
    '<div class="sc-code">'+esc(code||'')+'</div>'+
    '<div style="font-size:12px;color:var(--hint);margin-bottom:14px">Instagram postga ushbu kodni qo\'shing: #'+esc(code||'')+'</div>'+
    '<div class="sc-btns">'+
      '<button class="sc-btn blue" onclick="shareNewProd('+pid+',\''+esc(code||'')+'\')">📤 Ulashish</button>'+
      '<button class="sc-btn green" onclick="window.open(\'/api/catalog/qr/'+pid+'\',\'_blank\')">🔳 QR kod</button>'+
    '</div>'+
    '<button class="sc-btn outline" style="width:100%;margin-top:8px" onclick="this.closest(\'.success-card\').remove()">Yopish</button>'+
  '</div>';
  document.getElementById('main').insertAdjacentHTML('afterbegin', html);
}

function shareNewProd(pid, code) {
  var url = 'https://t.me/XazdentBot?start=xz_'+code;
  if (tg && tg.openTelegramLink) {
    tg.openTelegramLink('https://t.me/share/url?url='+encodeURIComponent(url)+'&text='+encodeURIComponent('🦷 Yangi mahsulot · '+code));
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(function(){ alert('Havola nusxalandi!'); });
  }
}
