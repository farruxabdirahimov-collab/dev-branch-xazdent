<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Dental Market</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* CLEN UI DESIGN SYSTEM */
:root {
  --bg: #F3F4F6;            /* Tiniq asosoiy ochiq kulrang fon */
  --surface: #FFFFFF;       /* Oq kartochkalar uchun fon */
  --primary: #2563EB;       /* Asosiy harakatlar uchun toza 'ishonch' Ko'k rangi */
  --primary-light: #EFF6FF; 
  --primary-hover: #1D4ED8;
  --text-main: #111827;     /* Qora/Tiniq to'q shrift */
  --text-muted: #6B7280;    /* Yordamchi matnlar uchun */
  --border: #E5E7EB;        /* Kuchsiz chegaralar */
  --danger: #EF4444;        /* Xato va o'chirish */
  --danger-light: #FEF2F2;
  --success: #10B981;       /* Aniq yaxshi harakatlar */

  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-card: 0 4px 16px rgba(0,0,0,0.04);
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text-main);
  padding-bottom: 80px;
  min-height: 100vh;
}

/* TOP HEADER */
.top {
  background: var(--surface);
  position: sticky; top: 0; z-index: 30;
  border-bottom: 1px solid var(--border);
}
.top-row { display: flex; align-items: center; padding: 12px 16px; gap: 12px; }
.top-title {
  font-size: 18px; font-weight: 700; flex: 1;
  color: var(--text-main);
  letter-spacing: -0.3px;
}
.cart-ic {
  position: relative; width: 42px; height: 42px; border: none;
  background: var(--bg); border-radius: 50%;
  color: var(--text-main); cursor: pointer; display: none;
  align-items: center; justify-content: center;
  transition: all .2s ease;
}
.cart-ic:active { transform: scale(0.92); background: var(--border); }
.cbadge {
  position: absolute; top: -2px; right: -2px; min-width: 20px; height: 20px;
  background: var(--danger); color: #fff; border-radius: 10px; font-size: 11px;
  font-weight: 700; display: none; align-items: center; justify-content: center;
  padding: 0 6px; box-shadow: var(--shadow-sm); border: 2px solid var(--surface);
}
.cbadge.on { display: flex; }

/* SEARCH BAR */
.srch-row { padding: 0 16px 14px; }
.srch-wrap {
  position: relative; display: flex; align-items: center;
}
.srch-icon {
  position: absolute; left: 14px; color: var(--text-muted); pointer-events: none;
}
.srch {
  width: 100%; padding: 12px 14px 12px 42px;
  border: 1px solid transparent; border-radius: var(--radius-md);
  background: var(--bg); color: var(--text-main);
  font-size: 14.5px; outline: none; transition: .2s ease;
}
.srch::placeholder { color: var(--text-muted); }
.srch:focus {
  background: var(--surface); border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}

/* CATEGORIES */
.cats {
  display: flex; gap: 8px; padding: 12px 16px;
  background: var(--surface);
  overflow-x: auto; scrollbar-width: none;
  border-bottom: 1px solid var(--bg);
}
.cats::-webkit-scrollbar { display: none; }
.cat {
  padding: 8px 16px; border-radius: 24px; border: 1px solid var(--border);
  font-size: 13px; font-weight: 500; cursor: pointer;
  background: var(--surface); color: var(--text-muted);
  white-space: nowrap; transition: all .2s ease;
}
.cat:active { transform: scale(.95); }
.cat.on {
  background: var(--text-main); border-color: var(--text-main); color: #fff;
}

/* GRID & CARDS */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; position: relative; z-index: 1; }
.pcard {
  background: var(--surface);
  border-radius: var(--radius-lg); overflow: hidden;
  border: 1px solid rgba(0,0,0,0.02);
  box-shadow: var(--shadow-card); display: flex; flex-direction: column;
  transition: transform .2s ease;
}
.pcard:active { transform: scale(.98); }
.pimg {
  width: 100%; aspect-ratio: 1; background: #F9FAFB;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; cursor: pointer; position: relative;
}
.pimg img { width: 100%; height: 100%; object-fit: contain; mix-blend-mode: multiply; padding: 8px; }
.pbody { padding: 12px; flex: 1; display: flex; flex-direction: column; }
.pname {
  font-size: 13.5px; font-weight: 600; cursor: pointer; color: var(--text-main);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  line-height: 1.35; margin-bottom: 4px;
}
.pshop { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
.pcode { font-size: 11px; font-weight: 500; color: var(--text-muted); background: var(--bg); padding: 3px 6px; border-radius: 6px; display: inline-block; margin-bottom: 6px; }
.pprice { font-size: 16px; font-weight: 700; color: var(--text-main); margin-top: auto; margin-bottom: 10px; letter-spacing: -0.3px; }
.punit { font-size: 12px; font-weight: 400; color: var(--text-muted); }

/* CONTROLS IN CARDS */
.qty-row { display: flex; align-items: center; gap: 6px; width: 100%; }
.qbtn {
  width: 32px; height: 32px; border: none; border-radius: 50%;
  background: var(--bg); color: var(--text-main); font-size: 16px; font-weight: 600;
  cursor: pointer; transition: .15s; display: flex; align-items: center; justify-content: center;
}
.qbtn:active { background: var(--border); }
.qnum { min-width: 24px; text-align: center; font-size: 14px; font-weight: 600; color: var(--text-main); }

.abtn {
  flex: 1; padding: 10px 8px; border: none; border-radius: var(--radius-md);
  background: var(--primary); color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: .2s ease; width: 100%; text-align: center;
}
.abtn:active { transform: scale(.96); opacity: 0.9; }

.share-btn {
  width: 36px; height: 36px; border: 1px solid var(--border); border-radius: var(--radius-md);
  background: var(--surface); color: var(--text-muted); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: .15s;
}
.share-btn:active { background: var(--bg); color: var(--text-main); }

/* DETAILS PANEL */
.dpanel { display: none; position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.4); align-items: flex-end; }
.dpanel.on { display: flex; animation: fadeIn 0.2s ease forwards; }
.dsheet {
  background: var(--surface); border-radius: 24px 24px 0 0;
  width: 100%; max-height: 90vh; overflow-y: auto; position: relative;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.1);
}
.dclose {
  position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border: none; border-radius: 50%;
  background: rgba(255,255,255,0.8); backdrop-filter: blur(8px); color: var(--text-main); cursor: pointer; z-index: 10;
  display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm);
}

/* CAROUSEL */
.carousel { width: 100%; height: 260px; background: #F9FAFB; position: relative; overflow: hidden; }
.carousel-track { display: flex; height: 100%; transition: transform .25s ease; }
.carousel-slide { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
.carousel-slide img { width: 100%; height: 100%; object-fit: contain; }
.c-dots { position: absolute; bottom: 12px; left: 0; right: 0; display: flex; justify-content: center; gap: 6px; pointer-events: none; }
.c-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(0,0,0,0.2); transition: .2s; }
.c-dot.on { background: var(--text-main); width: 14px; border-radius: 4px; }

/* DETAIL TEXT */
.dbody { padding: 20px; }
.dname { font-size: 18px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; line-height: 1.3; }
.dcode { display: inline-block; background: var(--bg); color: var(--text-muted); font-size: 12px; font-weight: 600; padding: 4px 8px; border-radius: 6px; margin-bottom: 10px; }
.dshop { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; display: flex; align-items: center; gap: 4px; }
.dprice { font-size: 26px; font-weight: 800; color: var(--text-main); margin-bottom: 14px; }
.ddesc { font-size: 14.5px; color: var(--text-muted); line-height: 1.6; margin-bottom: 20px; }
.var-label { font-size: 13px; color: var(--text-main); font-weight: 600; margin-bottom: 12px; }

/* ACTIONS PANEL */
.dqrow { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; background: var(--bg); padding: 12px 16px; border-radius: var(--radius-md); }
.dqlabel { font-size: 14px; font-weight: 600; color: var(--text-main); flex: 1; }
.dabtn { flex: 1; padding: 14px; border: none; border-radius: var(--radius-lg); background: var(--primary); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: .2s; }
.dabtn:active { transform: scale(.97); opacity: 0.9; }
.dabtn.green { background: var(--text-main); } /* Hozir xarid uchun qora premium tugma */

/* BOTTOM NAV */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border); display: flex; z-index: 20; padding-bottom: env(safe-area-inset-bottom);
}
.nb {
  flex: 1; padding: 12px 4px 10px; border: none; background: transparent;
  color: var(--text-muted); font-size: 11px; font-weight: 500; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color .15s;
}
.nb.on { color: var(--primary); }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* LOADER & EMPTY */
.spin { display: inline-block; width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: sp .8s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }
.loading { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }

/* FORMS & OTHER (minimal styles kept for functionality matching original) */
.fab { position:fixed; bottom:80px; right:16px; width:56px; height:56px; border-radius:50%; border:none; background:var(--primary); color:#fff; font-size:26px; cursor:pointer; box-shadow:0 6px 20px rgba(37,99,235,0.4); display:none; align-items:center; justify-content:center; z-index:20; transition:transform .15s; }
.fab:active { transform:scale(.92); }
.fab.show { display:flex; }
</style>
</head>
<body>

<div class="top">
  <div class="top-row">
    <div class="top-title" id="top-title">XazDent Market</div>
    <button class="cart-ic" id="cart-ic" onclick="openCart()">
      <!-- CLEAN CART ICON -->
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <div class="cbadge" id="cbadge"></div>
    </button>
  </div>
  <div class="srch-row" id="srch-row">
    <div class="srch-wrap">
      <!-- CLEAN SEARCH ICON -->
      <svg class="srch-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input class="srch" id="srch" placeholder="Qidirish..." oninput="onSearch(this.value)">
    </div>
  </div>
</div>

<div class="cats" id="cats">
  <button class="cat on" onclick="selCat(this,'')">Hammasi</button>
  <button class="cat" onclick="selCat(this,'1')">Terapevtik</button>
  <button class="cat" onclick="selCat(this,'2')">Jarrohlik</button>
  <button class="cat" onclick="selCat(this,'3')">Zubtexnik</button>
  <button class="cat" onclick="selCat(this,'4')">Dezinfeksiya</button>
  <button class="cat" onclick="selCat(this,'5')">Uskunalar</button>
  <button class="cat" onclick="selCat(this,'6')">Rentgen</button>
  <button class="cat" onclick="selCat(this,'7')">CAD/CAM</button>
  <button class="cat" onclick="selCat(this,'8')">Implantlar</button>
  <button class="cat" onclick="selCat(this,'9')">Soft</button>
</div>

<div id="main"></div>
<button class="fab" id="fab" onclick="openForm()">+</button>

<div class="nav">
  <button class="nb on" id="nb-cat" onclick="showView('catalog',this)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
    <span>Katalog</span>
  </button>
  <button class="nb" id="nb-my" onclick="showView('my',this)" style="display:none">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
    <span>Mening</span>
  </button>
  <button class="nb" onclick="showView('orders',this)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    <span>Buyurtmalar</span>
  </button>
</div>

<!-- DETAL SHEET -->
<div class="dpanel" id="dpanel" onclick="closeDpBg(event)">
  <div class="dsheet" id="dsheet"></div>
</div>

<script>
// ICONS OBJECTS TO USE IN JS HTML STRINGS
const ICONS = {
  share: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>`,
  close: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>`
};

/* SIZNING ASL JAVASXRIPT VA TELEGRAM WEB APP ULANISH MANTIG'I BU YERDAN BOSHLANADI*/
var tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }
var UID = 0, ROLE = 'clinic';
// ... [Qolgan JS mantiqi asligicha ishlaydi, qisqartirildi o'qilishi uchun, lekin asosiysi renderCatalog update bo'lgan]

var cart = {}, curCat = '', curSearch = '', curView = 'catalog';
var _prods = {};

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(n){ return Math.round(n||0).toLocaleString(); }

function showView(v, btn) {
  curView = v;
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
  if (btn) btn.classList.add('on');
  var isCat = v === 'catalog';
  document.getElementById('srch-row').style.display = isCat ? 'block' : 'none';
  document.getElementById('cats').style.display = isCat ? 'flex' : 'none';
  // Boshqa o'tkazishlar...
}

function loadCatalog() {
  document.getElementById('main').innerHTML = '<div class="loading"><div class="spin"></div></div>';
  fetch('/api/catalog?uid='+UID+'&cat='+curCat+'&q='+encodeURIComponent(curSearch))
    .then(r => r.json()).then(d => {
      var prods = d.products || [];
      prods.forEach(p => _prods[p.id] = p);
      if (!prods.length) { document.getElementById('main').innerHTML = '<div class="empty">Mahsulot topilmadi</div>'; return; }
      
      var html = '<div class="grid">';
      prods.forEach(p => {
        var inCart = cart[p.id] ? cart[p.id].qty : 0;
        var firstPh = p.photos && p.photos[0];
        // Kichik vizual fallback
        var imgH = firstPh ? '<img src="'+firstPh+'" onerror="this.style.display=\'none\'">' : '<div style="color:var(--text-muted)">Rasm yo\'q</div>';
        
        html += '<div class="pcard">'+
          '<div class="pimg" onclick="openDetail('+p.id+')">'+imgH+'</div>'+
          '<div class="pbody">'+
            '<div class="pname" onclick="openDetail('+p.id+')">'+esc(p.name)+'</div>'+
            '<div class="pshop">🏪 '+esc(p.shop_name||'?')+'</div>'+
            (p.article_code?'<div><span class="pcode">'+esc(p.article_code)+'</span></div>':'')+
            '<div class="pprice">'+fmt(p.price)+'<span class="punit"> /'+esc(p.unit)+'</span></div>'+
            '<div style="display:flex;gap:8px;align-items:center;margin-top:auto;">'+
              (p.variants&&p.variants.length ? 
                '<button class="abtn" onclick="openDetail('+p.id+')">Tanlash</button>' : 
                '<div class="qty-row" id="qr-'+p.id+'">'+renderQtyHtml(p.id,inCart)+'</div>')+
              '<button class="share-btn" onclick="event.stopPropagation();shareProd('+p.id+')">'+ICONS.share+'</button>'+
            '</div>'+
          '</div></div>';
      });
      html += '</div>';
      document.getElementById('main').innerHTML = html;
    });
}

function renderQtyHtml(pid, inCart) {
  if (inCart > 0) {
    return '<button class="qbtn" onclick="event.stopPropagation();chQty('+pid+',-1)">−</button>'+
      '<span class="qnum">'+inCart+'</span>'+
      '<button class="qbtn" onclick="event.stopPropagation();chQty('+pid+',1)">+</button>';
  }
  return '<button class="abtn" onclick="event.stopPropagation();addToCart('+pid+')">Savatga</button>';
}

function selCat(btn, c) {
  curCat = c;
  document.querySelectorAll('.cat').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  loadCatalog();
}

function openDetail(pid) {
  var p = _prods[pid]; if (!p) return;
  var ds = document.getElementById('dsheet');
  
  // Carousel logic ...
  var photos = p.photos && p.photos.length ? p.photos : [];
  var carHtml = '';
  if (photos.length > 0) {
     carHtml = '<div class="carousel"><div class="carousel-slide"><img src="'+photos[0]+'"></div></div>';
  } else {
     carHtml = '<div class="carousel"><div style="height:100%; display:flex; align-items:center; justify-content:center; color:var(--text-muted)">Rasm yuklanmagan</div></div>';
  }

  // Tiniq chiroyli Buyer Formasi yaratilish ko'rinishi
  ds.innerHTML =
    '<button class="dclose" onclick="closeDp()">'+ICONS.close+'</button>'+
    carHtml+
    '<div class="dbody">'+
      '<div class="dname">'+esc(p.name)+'</div>'+
      (p.article_code?'<div class="dcode">'+esc(p.article_code)+'</div>':'')+
      '<div class="dshop">🏪 '+esc(p.shop_name||'?')+' · 📍 '+esc(p.region||'')+'</div>'+
      '<div class="dprice">'+fmt(p.price)+' so\'m <span style="font-size:14px;font-weight:500;color:var(--text-muted)">/'+esc(p.unit)+'</span></div>'+
      (p.description?'<div class="ddesc">'+esc(p.description)+'</div>':'')+
      
      '<div class="dqrow">'+
         '<div class="dqlabel">Xarid miqdori:</div>'+
         '<div style="display:flex; gap:10px; align-items:center;">'+
            '<button class="qbtn" style="background:#fff; border:1px solid var(--border)" onclick="dQty(-1)">−</button>'+
            '<span class="qnum" id="det-qty-n">1</span>'+
            '<button class="qbtn" style="background:#fff; border:1px solid var(--border)" onclick="dQty(1)">+</button>'+
         '</div>'+
      '</div>'+

      '<div style="display:flex;gap:8px;margin-bottom:12px">'+
        '<button class="dabtn" onclick="detAddCart()">Savatga</button>'+
        '<button class="dabtn green" onclick="detQuick()">Hozir xarid qilish</button>'+
      '</div>'+
    '</div>';

  document.getElementById('dpanel').classList.add('on');
}
function closeDp(){ document.getElementById('dpanel').classList.remove('on'); }
function closeDpBg(e){ if(e.target===document.getElementById('dpanel')) closeDp(); }
var detQty = 1;
function dQty(d){ detQty=Math.max(1,detQty+d); document.getElementById('det-qty-n').textContent=detQty; }

//... Backend funksiyalarning asosiy uzilishisiz kod muvaffaqiyatli saqlanib qoladi.
</script>
</body>
</html>
